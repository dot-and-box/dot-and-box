<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>dot and box</title>
    <style>
      body {
        margin: 20px;
        overflow-x: hidden;
      }
    </style>
  </head>
  <body>
    <h1>Just dot and box...</h1>
    <dot-and-box
      controls keyboard
      experimental
      style="margin: 10px; height: 600px"

      code="
    title: 'Topic cleanup.policy=delete'
    box id: topic text: topic at: [-2.2,-3.2] size: [7.4,6.4] color: white textColor: black borderColor: black align: left verticalAlign: top
    boxes ids: 'partition 0' 'partition 1' 'partition 2' at: [-2,-2] size: [7,1.5] span: 0.2 layout: row
    line id: A at: [-4,0.5] end: [-2.2,0.5] color: black width: 2
    dot id: p_1 text: ' k:1 ' at: [-4.8,0] radius: 25
    dot id: p_2  text: ' k:2 ' at: [-4.8,0] radius: 25
    dot id: p_3  text: ' k:3 ' at: [-4.8,0] radius: 25

    dot id: pp_1  text: ' k:4 ' at: [-4.8,0] radius: 25
    dot id: ppp_1  text: ' k:5 ' at: [-4.8,0] radius: 25

    box id: producer text: 'producer' at: [-5.3,-2]  size: [2, 4.9] color: orange

    step: 'key: 1 mod 3 => partition 1'
    p_1 -> +[3,0]
    step: 'key: 2 mod 3 => partition 2'
    p_2 -> +[2,0]
    p_2 -> +[1,1.7]
    step: 'key: 3 mod 3 => partition 0'
    p_3 -> +[2,0]
    p_3 -> +[1,-1.7]
    step: 'fourth'
    p_ -> +[1.2,0], pp_1 -> +[3,0]
    step: 'fifth'
    p_ -> +[1,0], pp_ -> +[1,0]
    step: 'sixth'
    p_ -> +[1,0], pp_ -> +[1,0]
    step: 'seventh'
    ppp_1 -> +[2,0], p_ -> +[1,0], pp_ -> +[1,0]
    ppp_1 -> +[1,1.7]
    step: 'eight'
    ppp_ -> +[1,0], p_ -> +[1,0], pp_ -> +[1,0]
    step: 'eight'
    ppp_ -> +[1,0], p_ -> +[2,0], pp_ -> +[1,0]
    p_1 <- visible: false, p_2 <- visible: false, p_3 <- visible: false
"
    ></dot-and-box>
    <script type="module" src="/src/dotAndBoxElement.ts"></script>
  </body>
</html>
